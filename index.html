<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phil Town Rule #1 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-5">
            <h1 class="text-3xl font-extrabold text-green-500 tracking-tight">🏛️ Rule #1 Scanner</h1>
            <span class="text-sm text-gray-400">Server Local: Online</span>
        </header>

        <div id="stock-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-90"></div>
        
        <div class="modal-container bg-gray-800 w-11/12 md:max-w-2xl mx-auto rounded shadow-2xl z-50 overflow-y-auto border border-gray-700">
            
            <div class="modal-content py-6 text-left px-8">
                <div class="flex justify-between items-center pb-3 border-b border-gray-700">
                    <p class="text-3xl font-bold text-green-400" id="m-symbol"></p>
                    <div class="modal-close cursor-pointer z-50" onclick="toggleModal()">
                        <svg class="fill-current text-white" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
                            <path d="M14.53 4.53l-1.06-1.06L9 7.94 4.53 3.47 3.47 4.53 7.94 9l-4.47 4.47 1.06 1.06L9 10.06l4.47 4.47 1.06-1.06L10.06 9z"></path>
                        </svg>
                    </div>
                </div>

                <div class="my-5 grid grid-cols-1 md:grid-cols-2 gap-4" id="m-details">
                    </div>

                <div class="mt-6 flex justify-end">
                    <button onclick="toggleModal()" class="px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition">Închide</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleModal() {
            const body = document.querySelector('body');
            const modal = document.getElementById('modal');
            modal.classList.toggle('opacity-0');
            modal.classList.toggle('pointer-events-none');
            body.classList.toggle('modal-active');
        }

        async function loadData() {
            try {
                const response = await fetch('data.json');
                const stocks = await response.json();
                const container = document.getElementById('stock-list');

                stocks.forEach(stock => {
                    const isBuy = stock.price <= stock.mos;
                    const card = document.createElement('div');
                    card.className = `cursor-pointer p-6 bg-gray-800 rounded-xl border-2 transition transform hover:scale-105 ${isBuy ? 'border-green-500 hover:bg-gray-750' : 'border-gray-700 hover:border-blue-500'}`;
                    
                    card.onclick = () => {
                        document.getElementById('m-symbol').innerText = stock.symbol;
                        document.getElementById('m-details').innerHTML = `
                            <div class="bg-gray-700 p-4 rounded">
                                <p class="text-gray-400 text-xs uppercase font-bold">Sticker Price</p>
                                <p class="text-xl">$${stock.sticker}</p>
                            </div>
                            <div class="bg-gray-700 p-4 rounded border-l-4 border-green-500">
                                <p class="text-gray-400 text-xs uppercase font-bold text-green-400">Margin of Safety (Buy)</p>
                                <p class="text-xl font-bold">$${stock.mos}</p>
                            </div>
                            <div class="bg-gray-700 p-4 rounded">
                                <p class="text-gray-400 text-xs uppercase font-bold">Payback Time</p>
                                <p class="text-xl ${stock.payback <= 8 ? 'text-green-400' : 'text-yellow-400'}">${stock.payback} ani</p>
                            </div>
                            <div class="bg-gray-700 p-4 rounded">
                                <p class="text-gray-400 text-xs uppercase font-bold">Debt Payoff</p>
                                <p class="text-xl ${stock.debt_y <= 3 ? 'text-green-400' : 'text-red-400'}">${stock.debt_y} ani</p>
                            </div>
                            <div class="bg-gray-700 p-4 rounded">
                                <p class="text-gray-400 text-xs uppercase font-bold">Growth Rate</p>
                                <p class="text-xl font-bold text-blue-300">${stock.growth}%</p>
                            </div>
                            <div class="bg-gray-700 p-4 rounded">
                                <p class="text-gray-400 text-xs uppercase font-bold">Status</p>
                                <p class="text-xl font-bold ${isBuy ? 'text-green-500' : 'text-gray-400'}">${isBuy ? '🚀 BUY NOW' : '⏳ WAIT'}</p>
                            </div>
                        `;
                        toggleModal();
                    };

                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <h2 class="text-2xl font-black">${stock.symbol}</h2>
                            <span class="text-xs font-bold px-2 py-1 bg-gray-700 rounded">${isBuy ? '✅ IEFTIN' : '❌ SCUMP'}</span>
                        </div>
                        <p class="text-3xl font-bold mt-4">$${stock.price}</p>
                        <p class="text-sm text-gray-400">MoS: $${stock.mos}</p>
                        <div class="mt-6 flex items-center justify-between">
                            <span class="text-xs text-gray-500 italic">Click pentru detalii 4M</span>
                            <div class="h-2 w-2 rounded-full ${isBuy ? 'bg-green-500 animate-pulse' : 'bg-red-500'}"></div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error("Eroare la incarcarea datelor:", e);
            }
        }

        loadData();
    </script>
</body>
</html>
